name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Normalize formatting
        run: cargo fmt --all

      - name: Compile check
        run: cargo check --all-targets

      - name: Test
        run: cargo test --all-targets
