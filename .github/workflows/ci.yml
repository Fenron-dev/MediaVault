name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  rust-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            wget

      - name: Normalize formatting
        run: cargo fmt --all

      - name: Compile check
        run: cargo check --all-targets

      - name: Test
        run: cargo test --all-targets

  app-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Generate bundle icons
        run: cargo tauri icon icons/icon.png

      - name: Build bundled macOS app
        run: cargo tauri build --bundles dmg

      - name: List bundled outputs
        run: |
          find target/release/bundle -maxdepth 3 -print | sort

      - name: Archive app bundle for fallback testing
        run: |
          cd target/release/bundle/macos
          zip -r MediaVault.app.zip MediaVault.app

      - name: Upload bundled macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediavault-macos
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/MediaVault.app.zip
          if-no-files-found: error
